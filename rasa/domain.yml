version: "3.1"

intents:
  - greet
  - support
  - sales
  - billing
  - agent
  - repeat
  - confirm
  - deny
  - clarify
  - no_input
  - language_limitation
  - safe_continue
  - nlu_fallback

responses:
  utter_greet:
    - text: "PlaySBC real Rasa bot is online. You can ask for support, sales, billing, or an agent."
  utter_support:
    - text: "Support path is ready. I can keep the call in the support queue."
      custom:
        playsbc_action: join
        target: support
        reason: support intent
  utter_sales:
    - text: "Sales support agent is ready. I can help with pricing, demos, or transfer this call to the sales trunk."
      custom:
        playsbc_action: transfer
        target: sip:sales@peer.example
        reason: sales intent
  utter_billing:
    - text: "Billing path is ready. I can transfer this call to the billing trunk."
      custom:
        playsbc_action: transfer
        target: sip:billing@peer.example
        reason: billing intent
  utter_agent:
    - text: "I will try to transfer this call to a human agent."
      custom:
        playsbc_action: transfer
        target: sip:agent@peer.example
        reason: agent requested
  utter_repeat:
    - text: "Sure. PlaySBC is connected to real Rasa over the REST channel."
  utter_confirm:
    - text: "Confirmed. The AI control path is alive."
  utter_deny:
    - text: "Okay, I will not transfer you. You can ask for support, sales, billing, or an agent."
  utter_clarify:
    - text: "I can help with support, sales, billing, or an agent. Which one do you need?"
  utter_no_input:
    - text: "I did not hear anything. Please say support, sales, billing, or agent."
  utter_language_limitation:
    - text: "I can help in English in this lab. Please repeat the request in English."
  utter_safe_continue:
    - text: "I can continue helping with support, sales, billing, or an agent."
  utter_default:
    - text: "I heard you, but I am not sure where to route this yet."

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
