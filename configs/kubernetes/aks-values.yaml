# PlaySBC Azure AKS reference values.
#
# Replace the placeholder resource group, public IP names, DNS label, and CIDRs
# before applying this in a real Azure subscription.

topology:
  model: azure-aks-core-peer-active-active
  activeActive:
    enabled: true
    useStatefulSet: true
    playsbcReplicas: 2
    rtpengineReplicas: 2
    clusterId: playsbc-aks-aa
    sharedState:
      enabled: true
      mountPath: /var/lib/playsbc
      fileName: ha-state.sqlite3
      accessModes:
        - ReadWriteOnce
      size: 8Gi
    rtpenginePairing:
      enabled: true
  realms:
    core:
      name: core
      cidr: 172.28.0.0/24
      interface: net-core
    peer:
      name: peer
      cidr: 192.168.28.0/24
      interface: net-peer
  multus:
    enabled: false
    enforce: false

replicaCount: 2

image:
  repository: ghcr.io/sudheerkumarvatrapu/playsbc
  tag: "1.5.1"
  pullPolicy: Always

service:
  type: ClusterIP
  sipPort: 5060
  tlsPort: 5061
  healthPort: 8080
  sessionAffinity: ClientIP

cloud:
  provider: azure
  azure:
    enabled: true
    nodeResourceGroup: MC_PLAYSBC_NODE_RESOURCE_GROUP
    loadBalancer:
      externalTrafficPolicy: Local
      allowedSourceRanges:
        - 203.0.113.0/24
    sip:
      public:
        enabled: true
        publicIPName: playsbc-sip-pip
        publicIPResourceGroup: playsbc-network-rg
        dnsLabelName: playsbc-sip-lab
        allowedSourceRanges:
          - 203.0.113.0/24
      private:
        enabled: false
        subnetName: playsbc-private-subnet
        privateIPv4: 10.10.10.50
        allowedSourceRanges:
          - 10.0.0.0/8
    media:
      public:
        enabled: false
        publicIPName: playsbc-rtp-pip
        publicIPResourceGroup: playsbc-network-rg
        dnsLabelName: playsbc-rtp-lab
        allowedSourceRanges:
          - 203.0.113.0/24
        # Lab-only explicit media ports. Kubernetes Services do not support
        # a compact UDP port range, so full RTP/SRTP range exposure is handled
        # in the Azure networking hardening track.
        ports:
          - 30000
          - 30002
          - 30004
          - 30006
      documentedPortRange:
        min: 30000
        max: 32000

rtpengine:
  enabled: true
  image:
    repository: ghcr.io/sudheerkumarvatrapu/playsbc-rtpengine
    tag: "1.5.1"
    pullPolicy: Always
  replicas: 2
  hostNetwork: false
  sessionAffinity: ClientIP
  rtpMin: 30000
  rtpMax: 32000

playsbc:
  config:
    sip_advertised_ip: $POD_IP
    b2bua_advertised_ip: $POD_IP
    media_backend: rtpengine
    rtpengine_url: udp://playsbc-playsbc-rtpengine:2223
    rtpengine_directions:
      - core
      - peer
    rtpengine_interfaces:
      - core
      - peer

observability:
  enabled: true
  prometheus:
    enabled: true
    retention: 31d
    persistence:
      enabled: true
      size: 20Gi
    scrapeAnnotations: true
  grafana:
    enabled: true
    persistence:
      enabled: true
      size: 5Gi
    dashboard:
      enabled: true
