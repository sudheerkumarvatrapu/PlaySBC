rasa:
  enabled: true
  image:
    repository: rasa/rasa
    tag: 3.6.20-full
    pullPolicy: IfNotPresent
  trainOnStart: true

rtpengine:
  enabled: true

playsbc:
  config:
    media_backend: rtpengine
    rtpengine_url: udp://playsbc-playsbc-rtpengine:2223
    route_policies:
      - name: ai-rasa-real-gateway
        match: ai-bot
        target: ai-gateway:rasa-support
        priority: 5
      - name: registered-endpoints
        match: "*"
        target: registration
        priority: 100
    ai_voice_gateway:
      enabled: true
      provider: rasa
      bot_name: rasa-support
      rasa_timeout: 5.0
      input_mode: scripted
      initial_message: support
      stt_provider: lab-scripted
      tts_provider: text-only
      response_mode: rest
      bot_actions_enabled: true
      fallback_text: Real Rasa lab bot is unavailable
