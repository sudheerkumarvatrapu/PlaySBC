topology:
  model: core-peer-active-active
  activeActive:
    enabled: true
    useStatefulSet: true
    playsbcReplicas: 2
    rtpengineReplicas: 2
    clusterId: playsbc-aa-lab
    sharedState:
      enabled: true
      mountPath: /var/lib/playsbc
      fileName: ha-state.sqlite3
      accessModes:
        - ReadWriteOnce
      size: 1Gi
  realms:
    core:
      name: core
      cidr: 172.28.0.0/24
      interface: net-core
    peer:
      name: peer
      cidr: 192.168.28.0/24
      interface: net-peer
  multus:
    enabled: false
    enforce: false

replicaCount: 2

service:
  sessionAffinity: ClientIP

rtpengine:
  enabled: true
  replicas: 2
  hostNetwork: false
  sessionAffinity: ClientIP

playsbc:
  config:
    sip_advertised_ip: $POD_IP
    b2bua_advertised_ip: $POD_IP
    media_backend: rtpengine
    rtpengine_directions:
      - core
      - peer
    rtpengine_interfaces:
      - core
      - peer
