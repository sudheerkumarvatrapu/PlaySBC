image:
  repository: playsbc
  tag: local
  pullPolicy: Never

service:
  type: NodePort
  sessionAffinity: ClientIP

authSecret:
  enabled: true
  users:
    "1001": change-me-in-a-private-values-file

rtpengine:
  enabled: true
  image:
    repository: playsbc/rtpengine
    tag: local
    pullPolicy: Never
  hostNetwork: true
  sessionAffinity: ClientIP

playsbc:
  config:
    sip_transport: udp,tcp
    health_port: 8080
    rtpengine_directions: []
    route_policies:
      - name: registered-endpoints
        match: "*"
        target: registration
        priority: 10
