name: playsbc-real-topology

x-sipp-common: &sipp-common
  image: playsbc-real-topology-sipp:latest
  build:
    context: .
    dockerfile: docker/sipp.Dockerfile
  cap_add:
    - NET_RAW
  volumes:
    - ./sipp/scenarios:/scenarios:ro
    - ${PLAYSBC_TOPOLOGY_OUTPUT:?Set PLAYSBC_TOPOLOGY_OUTPUT}:/output
    - ${PLAYSBC_TOPOLOGY_TLS_DIR:-/tmp}:/tls:ro

services:
  rtpengine:
    build:
      context: .
      dockerfile: docker/rtpengine.Dockerfile
    command:
      - >-
        exec rtpengine --foreground --log-stderr
        --interface=core/172.28.0.40
        --interface=peer/192.168.28.40
        --listen-ng=0.0.0.0:2223
        --port-min=30000 --port-max=32000 --table=-1
    networks:
      core:
        ipv4_address: 172.28.0.40
      peer:
        ipv4_address: 192.168.28.40

  playsbc:
    build:
      context: .
      dockerfile: docker/playsbc.Dockerfile
    image: playsbc-real-topology-playsbc:latest
    command: ["python3", "/app/mini_call_server.py", "--config", "/etc/playsbc/server.yaml"]
    depends_on:
      - rtpengine
    volumes:
      - ${PLAYSBC_TOPOLOGY_CONFIG:?Set PLAYSBC_TOPOLOGY_CONFIG}:/etc/playsbc/server.yaml:ro
      - ${PLAYSBC_TOPOLOGY_OUTPUT:?Set PLAYSBC_TOPOLOGY_OUTPUT}:/var/log/playsbc
      - ${PLAYSBC_TOPOLOGY_TLS_DIR:-/tmp}:/etc/playsbc/tls:ro
    networks:
      core:
        ipv4_address: 172.28.0.20
      peer:
        ipv4_address: 192.168.28.20

  rasa-mock:
    image: playsbc-real-topology-playsbc:latest
    command:
      - python3
      - /app/tools/mock_rasa_server.py
      - --host
      - 0.0.0.0
      - --port
      - "5005"
      - --reply
      - "${PLAYSBC_RASA_MOCK_REPLY:-PlaySBC AI bot accepted {message} from {caller} to {callee}}"
      - --response-count
      - "${PLAYSBC_RASA_MOCK_RESPONSE_COUNT:-1}"
      - --action
      - "${PLAYSBC_RASA_MOCK_ACTION:-}"
      - --action-target
      - "${PLAYSBC_RASA_MOCK_ACTION_TARGET:-}"
    depends_on:
      - playsbc
    networks:
      core:
        ipv4_address: 172.28.0.60

  sipp-b:
    <<: *sipp-common
    depends_on:
      - playsbc
    working_dir: /output/sipp-b
    command:
      - -sf
      - /scenarios/topology/uas_peer_pcma.xml
      - -s
      - peer-b
      - -i
      - 192.168.28.30
      - -mi
      - 192.168.28.30
      - -p
      - "5060"
      - -m
      - "1"
      - -d
      - ${SIPP_HOLD_MS:-60000}
      - -trace_msg
      - -trace_err
      - -trace_stat
      - -nostdin
      - -timeout
      - "180"
      - -timeout_error
    networks:
      peer:
        ipv4_address: 192.168.28.30

  sipp-a:
    <<: *sipp-common
    depends_on:
      - playsbc
      - sipp-b
    working_dir: /output/sipp-a
    command:
      - 172.28.0.20:5060
      - -sf
      - /scenarios/topology/uac_core_pcmu.xml
      - -s
      - peer-b
      - -key
      - caller
      - core-a
      - -i
      - 172.28.0.10
      - -mi
      - 172.28.0.10
      - -p
      - "5060"
      - -m
      - "1"
      - -r
      - "1"
      - -d
      - ${SIPP_HOLD_MS:-60000}
      - -trace_msg
      - -trace_err
      - -trace_stat
      - -nostdin
      - -timeout
      - "180"
      - -timeout_error
    networks:
      core:
        ipv4_address: 172.28.0.10

  core-agent:
    image: playsbc-real-topology-sipp:latest
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_RAW
    volumes:
      - ./sipp/scenarios:/scenarios:ro
      - ${PLAYSBC_TOPOLOGY_OUTPUT:?Set PLAYSBC_TOPOLOGY_OUTPUT}:/output
      - ${PLAYSBC_TOPOLOGY_TLS_DIR:-/tmp}:/tls:ro
    working_dir: /output/work/sipp-a-uac
    networks:
      core:
        ipv4_address: 172.28.0.10

  peer-agent:
    image: playsbc-real-topology-sipp:latest
    entrypoint: ["sleep", "infinity"]
    cap_add:
      - NET_RAW
    volumes:
      - ./sipp/scenarios:/scenarios:ro
      - ${PLAYSBC_TOPOLOGY_OUTPUT:?Set PLAYSBC_TOPOLOGY_OUTPUT}:/output
      - ${PLAYSBC_TOPOLOGY_TLS_DIR:-/tmp}:/tls:ro
    working_dir: /output/work/sipp-b-uas
    networks:
      peer:
        ipv4_address: 192.168.28.30

  core-tools:
    image: playsbc-real-topology-playsbc:latest
    entrypoint: ["sleep", "infinity"]
    depends_on:
      - core-agent
    volumes:
      - ${PLAYSBC_TOPOLOGY_OUTPUT:?Set PLAYSBC_TOPOLOGY_OUTPUT}:/output
    network_mode: service:core-agent

  peer-tools:
    image: playsbc-real-topology-playsbc:latest
    entrypoint: ["sleep", "infinity"]
    depends_on:
      - peer-agent
    volumes:
      - ${PLAYSBC_TOPOLOGY_OUTPUT:?Set PLAYSBC_TOPOLOGY_OUTPUT}:/output
    network_mode: service:peer-agent

  rtcp-a:
    image: playsbc-real-topology-playsbc:latest
    entrypoint: ["python3", "/app/tools/send_rtcp_reports.py"]
    command:
      - --local-ip
      - 172.28.0.10
      - --source-port
      - "6001"
      - --target-ip
      - 172.28.0.40
      - --target-port
      - "30001"
      - --ssrc
      - "0xc0dec0de"
      - --cname
      - core-a@playsbc
      - --duration-seconds
      - "58"
      - --interval-seconds
      - "5"
      - --expect-reply
    depends_on:
      - sipp-a
    network_mode: service:sipp-a

  rtcp-b:
    image: playsbc-real-topology-playsbc:latest
    entrypoint: ["python3", "/app/tools/send_rtcp_reports.py"]
    command:
      - --local-ip
      - 192.168.28.30
      - --source-port
      - "6001"
      - --target-ip
      - 192.168.28.40
      - --target-port
      - "30001"
      - --ssrc
      - "0xc0dec0de"
      - --cname
      - peer-b@playsbc
      - --duration-seconds
      - "58"
      - --interval-seconds
      - "5"
      - --expect-reply
    depends_on:
      - sipp-b
    network_mode: service:sipp-b

  capture-signalling:
    <<: *sipp-common
    entrypoint: ["tcpdump"]
    command: ["-U", "--immediate-mode", "-i", "any", "-s", "0", "-w", "/output/signalling.pcap", "port", "5060", "or", "port", "5061", "or", "port", "2223", "or", "port", "5005"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - playsbc
    network_mode: service:playsbc

  capture-media:
    <<: *sipp-common
    entrypoint: ["tcpdump"]
    command: ["-U", "--immediate-mode", "-i", "any", "-s", "0", "-w", "/output/media.pcap", "udp", "portrange", "30000-32000"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - rtpengine
    network_mode: service:rtpengine

  capture-media-ring:
    <<: *sipp-common
    entrypoint: ["tcpdump"]
    command: ["-U", "--immediate-mode", "-i", "any", "-s", "0", "-C", "8", "-W", "4", "-w", "/output/media-ring.pcap", "udp", "portrange", "30000-32000"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - rtpengine
    network_mode: service:rtpengine

  capture-internal-media:
    <<: *sipp-common
    entrypoint: ["tcpdump"]
    command: ["-U", "--immediate-mode", "-i", "any", "-s", "0", "-w", "/output/internal-media.pcap", "udp", "portrange", "30000-32000"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - playsbc
    network_mode: service:playsbc

  capture-internal-media-ring:
    <<: *sipp-common
    entrypoint: ["tcpdump"]
    command: ["-U", "--immediate-mode", "-i", "any", "-s", "0", "-C", "8", "-W", "4", "-w", "/output/internal-media-ring.pcap", "udp", "portrange", "30000-32000"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - playsbc
    network_mode: service:playsbc

networks:
  core:
    name: playsbc-core
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/24
  peer:
    name: playsbc-peer
    internal: true
    ipam:
      config:
        - subnet: 192.168.28.0/24
