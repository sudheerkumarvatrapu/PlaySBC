<svg width="960" height="280" viewBox="0 0 960 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PlaySBC logo</title>
  <desc id="desc">A colorful PlaySBC logo for a playful Session Border Controller lab with SIP, RTP, RTPengine, Voice AI Gateway, and Rasa regression.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="30" x2="920" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12355B"/>
      <stop offset="0.48" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="accent" x1="128" y1="66" x2="298" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="0.55" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <linearGradient id="pulse" x1="116" y1="153" x2="318" y2="153" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#FACC15"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="960" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="32" y="28" width="896" height="224" rx="34" fill="url(#bg)" filter="url(#softShadow)"/>
  <path d="M790 62C840 62 880 102 880 152C880 202 840 242 790 242" stroke="#67E8F9" stroke-width="2" stroke-dasharray="8 12" opacity="0.42"/>
  <path d="M724 38C784 72 822 111 840 158C856 199 854 229 836 250" stroke="#A7F3D0" stroke-width="2" stroke-dasharray="7 13" opacity="0.36"/>

  <g transform="translate(94 60)">
    <circle cx="94" cy="94" r="74" fill="#0F172A" opacity="0.42"/>
    <circle cx="94" cy="94" r="62" fill="url(#accent)"/>
    <path d="M57 125V64C57 55 67 50 75 55L128 86C136 91 136 103 128 108L75 139C67 144 57 138 57 125Z" fill="#0F172A"/>
    <circle cx="37" cy="94" r="12" fill="#22D3EE"/>
