replicaCount: 1

topology:
  model: core-peer-active-active
  activeActive:
    enabled: false
    useStatefulSet: true
    playsbcReplicas: 2
    rtpengineReplicas: 2
    clusterId: playsbc-aa-lab
    nodePrefix: playsbc
    loadBalancingPolicy: external-lb
    sharedState:
      enabled: true
      mountPath: /var/lib/playsbc
      fileName: ha-state.sqlite3
      accessModes:
        - ReadWriteOnce
      size: 1Gi
      storageClassName: ""
    rtpenginePairing:
      enabled: true
      serviceName: ""
      headlessServiceName: ""
  realms:
    core:
      name: core
      cidr: 172.28.0.0/24
      logicalGateway: 172.28.0.1
      interface: net-core
    peer:
      name: peer
      cidr: 192.168.28.0/24
      logicalGateway: 192.168.28.1
      interface: net-peer
  multus:
    enabled: false
    enforce: false
    createNetworkAttachmentDefinitions: false
    namespace: ""
    coreNetwork:
      name: playsbc-core-realm
      type: bridge
      bridge: playsbc-core0
      subnet: 172.28.0.0/24
      rangeStart: 172.28.0.20
      rangeEnd: 172.28.0.220
      gateway: 172.28.0.1
      interface: net-core
    peerNetwork:
      name: playsbc-peer-realm
      type: bridge
      bridge: playsbc-peer0
      subnet: 192.168.28.0/24
      rangeStart: 192.168.28.20
      rangeEnd: 192.168.28.220
      gateway: 192.168.28.1
      interface: net-peer

image:
  # For direct deployments after image publishing, use:
  # repository: ghcr.io/sudheerkumarvatrapu/playsbc
  repository: playsbc
  tag: "1.4.4"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  sipPort: 5062
  tlsPort: 5061
  healthPort: 8080
  sessionAffinity: ClientIP
  annotations: {}

cloud:
  provider: ""
  azure:
    enabled: false
    nodeResourceGroup: ""
    loadBalancer:
      externalTrafficPolicy: Local
      allowedSourceRanges: []
    sip:
      public:
        enabled: false
        publicIPName: ""
        publicIPv4: ""
        publicIPResourceGroup: ""
        dnsLabelName: ""
        allowedSourceRanges: []
        annotations: {}
      private:
        enabled: false
        privateIPv4: ""
        subnetName: ""
        allowedSourceRanges: []
        annotations: {}
    media:
      public:
        enabled: false
        publicIPName: ""
        publicIPv4: ""
        publicIPResourceGroup: ""
        dnsLabelName: ""
        allowedSourceRanges: []
        annotations: {}
        ports: []
      documentedPortRange:
        min: 30000
        max: 32000

hostNetwork: false

resources: {}

observability:
  enabled: false
  prometheus:
    enabled: false
    image:
      repository: prom/prometheus
      tag: v2.55.1
      pullPolicy: IfNotPresent
    scrapeInterval: 2s
    evaluationInterval: 2s
    retention: 31d
    service:
      type: ClusterIP
      port: 9090
    persistence:
      enabled: true
      size: 5Gi
      storageClassName: ""
    resources: {}
    scrapeAnnotations: false
    serviceMonitor:
      enabled: false
      interval: 15s
      scrapeTimeout: 5s
      labels: {}
    rules:
      enabled: false
      labels: {}
  grafana:
    enabled: false
    image:
      repository: grafana/grafana
      tag: 11.4.0
      pullPolicy: IfNotPresent
    adminUser: admin
    adminPassword: playsbc-lab
    service:
      type: ClusterIP
      port: 3000
    persistence:
      enabled: true
      size: 2Gi
      storageClassName: ""
    resources: {}
    dashboard:
      enabled: false
      labels:
        grafana_dashboard: "1"

authSecret:
  enabled: false
  existingSecret: ""
  users: {}

tls:
  enabled: false
  existingSecret: ""

rtpengine:
  enabled: false
  image:
    # For direct deployments after image publishing, use:
    # repository: ghcr.io/sudheerkumarvatrapu/playsbc-rtpengine
    repository: drachtio/rtpengine
    tag: latest
    pullPolicy: IfNotPresent
  controlPort: 2223
  rtpMin: 30000
  rtpMax: 32000
  replicas: 1
  hostNetwork: true
  sessionAffinity: ClientIP
  resources: {}

rasa:
  enabled: false
  image:
    repository: rasa/rasa
    tag: 3.6.20-full
    pullPolicy: IfNotPresent
  servicePort: 5005
  trainOnStart: true
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 120
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
  resources: {}
  project:
    config: |
      recipe: default.v1
      language: en
      pipeline:
        - name: WhitespaceTokenizer
        - name: RegexFeaturizer
        - name: LexicalSyntacticFeaturizer
        - name: CountVectorsFeaturizer
        - name: DIETClassifier
          epochs: 100
        - name: EntitySynonymMapper
        - name: ResponseSelector
          epochs: 40
        - name: FallbackClassifier
          threshold: 0.05
      policies:
        - name: RulePolicy
          core_fallback_threshold: 0.4
          core_fallback_action_name: utter_default
          enable_fallback_prediction: true
    domain: |
      version: "3.1"
      intents:
        - greet
        - support
        - sales
        - billing
        - agent
        - repeat
        - confirm
        - deny
        - clarify
        - no_input
        - language_limitation
        - safe_continue
        - nlu_fallback
      responses:
        utter_greet:
          - text: "PlaySBC real Rasa bot is online."
        utter_support:
          - text: "Support path is ready. I can keep the call in the support queue."
            custom:
              playsbc_action: join
              target: support
              reason: support intent
        utter_sales:
          - text: "Sales support agent is ready. I can help with pricing, demos, or transfer this call to the sales trunk."
            custom:
              playsbc_action: transfer
              target: sip:sales@peer.example
              reason: sales intent
        utter_billing:
          - text: "Billing path is ready. I can transfer this call to the billing trunk."
            custom:
              playsbc_action: transfer
              target: sip:billing@peer.example
              reason: billing intent
        utter_agent:
          - text: "I will try to transfer this call to a human agent."
            custom:
              playsbc_action: transfer
              target: sip:agent@peer.example
              reason: agent requested
        utter_repeat:
          - text: "Sure. PlaySBC is connected to real Rasa over the REST channel."
        utter_confirm:
          - text: "Confirmed. The AI control path is alive."
        utter_deny:
          - text: "Okay, I will not transfer you. You can ask for support, sales, billing, or an agent."
        utter_clarify:
          - text: "I can help with support, sales, billing, or an agent. Which one do you need?"
        utter_no_input:
          - text: "I did not hear anything. Please say support, sales, billing, or agent."
        utter_language_limitation:
          - text: "I can help in English in this lab. Please repeat the request in English."
        utter_safe_continue:
          - text: "I can continue helping with support, sales, billing, or an agent."
        utter_default:
          - text: "I heard you, but I am not sure where to route this yet."
      session_config:
        session_expiration_time: 60
        carry_over_slots_to_new_session: true
    nlu: |
      version: "3.1"
      nlu:
        - intent: greet
          examples: |
            - hello
            - hello from playsbc real rasa
            - hi
        - intent: support
          examples: |
            - support
            - I need support
            - connect me to support
            - I have a problem with my connection
            - My service has stopped working
        - intent: sales
          examples: |
            - sales
            - talk to sales
            - connect me to sales
            - sales support
            - I need sales support
            - Tell me about your pricing plans
            - I want to purchase a new connection
        - intent: billing
          examples: |
            - billing
            - invoice help
            - payment issue
            - Why was I charged twice?
            - My invoice amount is incorrect
        - intent: agent
          examples: |
            - agent
            - human agent
            - transfer me to an agent
            - Let me speak with someone
        - intent: repeat
          examples: |
            - repeat
            - say that again
            - That didn't make sense, say it again
        - intent: confirm
          examples: |
            - yes
            - confirm
            - Yes, please proceed
        - intent: deny
          examples: |
            - no
            - No, don't transfer me
            - I don't want sales
            - Transfer me actually don't
            - don't transfer me
        - intent: clarify
          examples: |
            - Billing or maybe support
            - I want help
            - help
            - I need help
        - intent: no_input
          examples: |
            - silence
            - no audio
        - intent: language_limitation
          examples: |
            - necesito ayuda
            - je veux de l'aide
        - intent: safe_continue
          examples: |
            - this is stupid
            - damn this service
        - intent: nlu_fallback
          examples: |
            - flibbertigibbet quantum banana
            - !@#$%^&*
    rules: |
      version: "3.1"
      rules:
        - rule: Greet caller
          steps:
            - intent: greet
            - action: utter_greet
        - rule: Route support intent
          steps:
            - intent: support
            - action: utter_support
        - rule: Route sales intent
          steps:
            - intent: sales
            - action: utter_sales
        - rule: Route billing intent
          steps:
            - intent: billing
            - action: utter_billing
        - rule: Route agent intent
          steps:
            - intent: agent
            - action: utter_agent
        - rule: Repeat status
          steps:
            - intent: repeat
            - action: utter_repeat
        - rule: Confirm status
          steps:
            - intent: confirm
            - action: utter_confirm
        - rule: Deny transfer
          steps:
            - intent: deny
            - action: utter_deny
        - rule: Clarify ambiguous request
          steps:
            - intent: clarify
            - action: utter_clarify
        - rule: Reprompt on no input
          steps:
            - intent: no_input
            - action: utter_no_input
        - rule: Unsupported language
          steps:
            - intent: language_limitation
            - action: utter_language_limitation
        - rule: Safe continuation
          steps:
            - intent: safe_continue
            - action: utter_safe_continue
        - rule: Fallback
          steps:
            - intent: nlu_fallback
            - action: utter_default
    credentials: |
      rest:
    endpoints: |
      action_endpoint:
        url: ""

playsbc:
  config:
    sip_ip: 0.0.0.0
    sip_advertised_ip: ""
    b2bua_advertised_ip: ""
    sip_port: 5062
    tls_port: 5061
    sip_transport: udp
    rtp_min: 30000
    rtp_max: 30100
    default_codec: PCMU
    auth_realm: playsbc
    users: {}
    bridge_rooms:
      - bridge
    b2bua_routes: {}
    route_policies:
      - name: registered-endpoints
        match: "*"
        target: registration
        priority: 10
    trunk_groups: []
    hunt_groups: []
    number_normalization: []
    header_normalization: {}
    transport_policies: []
    call_admission: {}
    b2bua_ladder_logs: true
    media_backend: internal
    rtpengine_url: udp://rtpengine:2223
    rtpengine_timeout: 3.0
    rtpengine_directions: []
    rtpengine_interfaces: []
    rtpengine_max_sessions: -1
    rtpengine_offer_transport_protocol: ""
    rtpengine_answer_transport_protocol: ""
    rtpengine_sdes: []
    rtpengine_dtls: ""
    media_quality: {}
    ha:
      enabled: false
      cluster_id: playsbc-aa-lab
      node_id: playsbc-a
      shared_state_path: /var/lib/playsbc/ha-state.sqlite3
      nodes:
        - node_id: playsbc-a
          state: active
          weight: 100
        - node_id: playsbc-b
          state: active
          weight: 100
      load_balancing:
        enabled: true
        policy: external-lb
        drain_new_calls: true
      failover:
        dialog_restore: true
        mid_call_failover: dialog-restore-only
        rtpengine_session_migration: planned
      rtpengine_pairs: []
    ai_voice_gateway:
      enabled: false
      provider: rasa
      bot_name: rasa-support
      rasa_webhook_url: http://rasa:5005/webhooks/rest/webhook
      rasa_timeout: 3.0
      input_mode: scripted
      stt_provider: lab-scripted
      stt_command: ""
      tts_provider: text-only
      tts_command: ""
      response_mode: rest
      tts_chunk_chars: 220
      bot_actions_enabled: true
      initial_message: hello
      fallback_text: AI assistant is not available right now.
      dtmf_intents:
        "0": agent
        "1": sales
        "2": support
        "3": billing
        "5": help
        "*": repeat
        "#": confirm
    reject_unknown_routes: false
    tls_certfile: ""
    tls_keyfile: ""
    tls_cafile: ""
    tls_verify_peer: false
    health_ip: 0.0.0.0
    health_port: 8080
    users_file: ""
    debug: false
