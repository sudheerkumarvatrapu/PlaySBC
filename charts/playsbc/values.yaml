replicaCount: 1

image:
  repository: playsbc
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  sipPort: 5062
  tlsPort: 5061
  healthPort: 8080
  sessionAffinity: ClientIP

hostNetwork: false

resources: {}

authSecret:
  enabled: false
  existingSecret: ""
  users: {}

tls:
  enabled: false
  existingSecret: ""

rtpengine:
  enabled: false
  image:
    repository: drachtio/rtpengine
    tag: latest
    pullPolicy: IfNotPresent
  controlPort: 2223
  rtpMin: 30000
  rtpMax: 32000
  hostNetwork: true
  sessionAffinity: ClientIP
  resources: {}

playsbc:
  config:
    sip_ip: 0.0.0.0
    sip_advertised_ip: ""
    b2bua_advertised_ip: ""
    sip_port: 5062
    tls_port: 5061
    sip_transport: udp
    rtp_min: 30000
    rtp_max: 30100
    default_codec: PCMU
    auth_realm: playsbc
    users: {}
    bridge_rooms:
      - bridge
    b2bua_routes: {}
    route_policies:
      - name: registered-endpoints
        match: "*"
        target: registration
        priority: 10
    trunk_groups: []
    hunt_groups: []
    number_normalization: []
    header_normalization: {}
    transport_policies: []
    call_admission: {}
    b2bua_ladder_logs: true
    media_backend: internal
    rtpengine_url: udp://rtpengine:2223
    rtpengine_timeout: 3.0
    rtpengine_directions: []
    rtpengine_interfaces: []
    rtpengine_max_sessions: -1
    rtpengine_offer_transport_protocol: ""
    rtpengine_answer_transport_protocol: ""
    rtpengine_sdes: []
    rtpengine_dtls: ""
    media_quality: {}
    ha:
      enabled: false
      cluster_id: playsbc-aa-lab
      node_id: playsbc-a
      shared_state_path: /var/lib/playsbc/ha-state.sqlite3
      rtpengine_pairs: []
    ai_voice_gateway:
      enabled: false
      provider: rasa
      bot_name: rasa-support
      rasa_webhook_url: http://rasa:5005/webhooks/rest/webhook
      rasa_timeout: 3.0
      input_mode: scripted
      stt_provider: lab-scripted
      stt_command: ""
      tts_provider: text-only
      tts_command: ""
      response_mode: rest
      bot_actions_enabled: true
      initial_message: hello
      fallback_text: AI assistant is not available right now.
      dtmf_intents:
        "0": agent
        "1": sales
        "2": support
        "3": billing
        "5": help
        "*": repeat
        "#": confirm
    reject_unknown_routes: false
    tls_certfile: ""
    tls_keyfile: ""
    tls_cafile: ""
    tls_verify_peer: false
    health_ip: 0.0.0.0
    health_port: 8080
    users_file: ""
    debug: false
