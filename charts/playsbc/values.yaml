replicaCount: 1

image:
  # For direct deployments after image publishing, use:
  # repository: ghcr.io/sudheerkumarvatrapu/playsbc
  repository: playsbc
  tag: "1.2.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  sipPort: 5062
  tlsPort: 5061
  healthPort: 8080
  sessionAffinity: ClientIP

hostNetwork: false

resources: {}

authSecret:
  enabled: false
  existingSecret: ""
  users: {}

tls:
  enabled: false
  existingSecret: ""

rtpengine:
  enabled: false
  image:
    # For direct deployments after image publishing, use:
    # repository: ghcr.io/sudheerkumarvatrapu/playsbc-rtpengine
    repository: drachtio/rtpengine
    tag: latest
    pullPolicy: IfNotPresent
  controlPort: 2223
  rtpMin: 30000
  rtpMax: 32000
  hostNetwork: true
  sessionAffinity: ClientIP
  resources: {}

rasa:
  enabled: false
  image:
    repository: rasa/rasa
    tag: 3.6.20-full
    pullPolicy: IfNotPresent
  servicePort: 5005
  trainOnStart: true
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 120
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
  resources: {}
  project:
    config: |
      recipe: default.v1
      language: en
      pipeline:
        - name: WhitespaceTokenizer
        - name: CountVectorsFeaturizer
        - name: DIETClassifier
          epochs: 40
      policies:
        - name: RulePolicy
    domain: |
      version: "3.1"
      intents:
        - greet
        - support
        - sales
        - billing
        - agent
        - repeat
        - confirm
        - nlu_fallback
      responses:
        utter_greet:
          - text: "PlaySBC real Rasa bot is online."
        utter_support:
          - text: "Support path is ready. I can keep the call in the support queue."
            custom:
              playsbc_action: join
              target: support
              reason: support intent
        utter_sales:
          - text: "Sales path is ready. I can transfer this call to the sales trunk."
            custom:
              playsbc_action: transfer
              target: sip:sales@peer.example
              reason: sales intent
        utter_billing:
          - text: "Billing path is ready. I can transfer this call to the billing trunk."
            custom:
              playsbc_action: transfer
              target: sip:billing@peer.example
              reason: billing intent
        utter_agent:
          - text: "I will try to transfer this call to a human agent."
            custom:
              playsbc_action: transfer
              target: sip:agent@peer.example
              reason: agent requested
        utter_repeat:
          - text: "Sure. PlaySBC is connected to real Rasa over the REST channel."
        utter_confirm:
          - text: "Confirmed. The AI control path is alive."
        utter_default:
          - text: "I heard you, but I am not sure where to route this yet."
      session_config:
        session_expiration_time: 60
        carry_over_slots_to_new_session: true
    nlu: |
      version: "3.1"
      nlu:
        - intent: greet
          examples: |
            - hello
            - hello from playsbc real rasa
            - hi
        - intent: support
          examples: |
            - support
            - I need support
            - connect me to support
        - intent: sales
          examples: |
            - sales
            - talk to sales
            - connect me to sales
        - intent: billing
          examples: |
            - billing
            - invoice help
            - payment issue
        - intent: agent
          examples: |
            - agent
            - human agent
            - transfer me to an agent
        - intent: repeat
          examples: |
            - repeat
            - say that again
        - intent: confirm
          examples: |
            - yes
            - confirm
    rules: |
      version: "3.1"
      rules:
        - rule: Greet caller
          steps:
            - intent: greet
            - action: utter_greet
        - rule: Route support intent
          steps:
            - intent: support
            - action: utter_support
        - rule: Route sales intent
          steps:
            - intent: sales
            - action: utter_sales
        - rule: Route billing intent
          steps:
            - intent: billing
            - action: utter_billing
        - rule: Route agent intent
          steps:
            - intent: agent
            - action: utter_agent
        - rule: Repeat status
          steps:
            - intent: repeat
            - action: utter_repeat
        - rule: Confirm status
          steps:
            - intent: confirm
            - action: utter_confirm
        - rule: Fallback
          steps:
            - intent: nlu_fallback
            - action: utter_default
    credentials: |
      rest:
    endpoints: |
      action_endpoint:
        url: ""

playsbc:
  config:
    sip_ip: 0.0.0.0
    sip_advertised_ip: ""
    b2bua_advertised_ip: ""
    sip_port: 5062
    tls_port: 5061
    sip_transport: udp
    rtp_min: 30000
    rtp_max: 30100
    default_codec: PCMU
    auth_realm: playsbc
    users: {}
    bridge_rooms:
      - bridge
    b2bua_routes: {}
    route_policies:
      - name: registered-endpoints
        match: "*"
        target: registration
        priority: 10
    trunk_groups: []
    hunt_groups: []
    number_normalization: []
    header_normalization: {}
    transport_policies: []
    call_admission: {}
    b2bua_ladder_logs: true
    media_backend: internal
    rtpengine_url: udp://rtpengine:2223
    rtpengine_timeout: 3.0
    rtpengine_directions: []
    rtpengine_interfaces: []
    rtpengine_max_sessions: -1
    rtpengine_offer_transport_protocol: ""
    rtpengine_answer_transport_protocol: ""
    rtpengine_sdes: []
    rtpengine_dtls: ""
    media_quality: {}
    ha:
      enabled: false
      cluster_id: playsbc-aa-lab
      node_id: playsbc-a
      shared_state_path: /var/lib/playsbc/ha-state.sqlite3
      nodes:
        - node_id: playsbc-a
          state: active
          weight: 100
        - node_id: playsbc-b
          state: active
          weight: 100
      load_balancing:
        enabled: true
        policy: external-lb
        drain_new_calls: true
      failover:
        dialog_restore: true
        mid_call_failover: dialog-restore-only
        rtpengine_session_migration: planned
      rtpengine_pairs: []
    ai_voice_gateway:
      enabled: false
      provider: rasa
      bot_name: rasa-support
      rasa_webhook_url: http://rasa:5005/webhooks/rest/webhook
      rasa_timeout: 3.0
      input_mode: scripted
      stt_provider: lab-scripted
      stt_command: ""
      tts_provider: text-only
      tts_command: ""
      response_mode: rest
      bot_actions_enabled: true
      initial_message: hello
      fallback_text: AI assistant is not available right now.
      dtmf_intents:
        "0": agent
        "1": sales
        "2": support
        "3": billing
        "5": help
        "*": repeat
        "#": confirm
    reject_unknown_routes: false
    tls_certfile: ""
    tls_keyfile: ""
    tls_cafile: ""
    tls_verify_peer: false
    health_ip: 0.0.0.0
    health_port: 8080
    users_file: ""
    debug: false
