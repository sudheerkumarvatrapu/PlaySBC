{{- if or .Values.observability.enabled .Values.observability.prometheus.enabled .Values.observability.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "playsbc.fullname" . }}-prometheus-config
  labels:
{{ include "playsbc.labels" . | indent 4 }}
data:
  prometheus.yml: |-
    global:
      scrape_interval: {{ .Values.observability.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.observability.prometheus.evaluationInterval }}
    rule_files:
      - /etc/prometheus/rules.yml
    scrape_configs:
      - job_name: playsbc
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ include "playsbc.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.healthPort }}
            labels:
              app: playsbc
              namespace: {{ .Release.Namespace }}
              realm_model: core-peer
      - job_name: prometheus
        static_configs:
          - targets:
              - 127.0.0.1:9090
  rules.yml: |-
    groups:
      - name: playsbc.rules
        rules:
          - alert: PlaySBCAdmissionRejectionsHigh
            expr: sum(rate(playsbc_admission_rejections_total[5m])) > 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: PlaySBC is rejecting admitted calls.
          - alert: PlaySBCRtpengineControlFailures
            expr: sum(rate(playsbc_rtpengine_control_failures_total[5m])) > 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: RTPengine control path is failing.
          - alert: PlaySBCAiRasaFailures
            expr: sum(rate(playsbc_ai_rasa_failures_total[5m])) > 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: AI/Rasa voice turns are failing.
          - alert: PlaySBCTrunkDown
            expr: min(playsbc_trunk_healthy) == 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: One or more PlaySBC trunks are unhealthy.
          - alert: PlaySBCHaNodeDraining
            expr: max(playsbc_ha_node_draining) > 0
            for: 5m
            labels:
              severity: info
            annotations:
              summary: A PlaySBC HA node is draining.
---
{{- if .Values.observability.prometheus.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "playsbc.fullname" . }}-prometheus
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
{{- if .Values.observability.prometheus.persistence.storageClassName }}
  storageClassName: {{ .Values.observability.prometheus.persistence.storageClassName | quote }}
{{- end }}
  resources:
    requests:
      storage: {{ .Values.observability.prometheus.persistence.size }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "playsbc.fullname" . }}-prometheus
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "playsbc.name" . }}-prometheus
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "playsbc.name" . }}-prometheus
        app.kubernetes.io/instance: {{ .Release.Name }}
        playsbc.openai.com/realm-model: core-peer
    spec:
      containers:
        - name: prometheus
          image: "{{ .Values.observability.prometheus.image.repository }}:{{ .Values.observability.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.observability.prometheus.image.pullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.observability.prometheus.retention }}
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
          resources:
{{ toYaml .Values.observability.prometheus.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "playsbc.fullname" . }}-prometheus-config
        - name: data
{{- if .Values.observability.prometheus.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "playsbc.fullname" . }}-prometheus
{{- else }}
          emptyDir: {}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "playsbc.fullname" . }}-prometheus
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  type: {{ .Values.observability.prometheus.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "playsbc.name" . }}-prometheus
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.observability.prometheus.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
{{- if or .Values.observability.enabled .Values.observability.grafana.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "playsbc.fullname" . }}-grafana-admin
  labels:
{{ include "playsbc.labels" . | indent 4 }}
type: Opaque
stringData:
  admin-user: {{ .Values.observability.grafana.adminUser | quote }}
  admin-password: {{ .Values.observability.grafana.adminPassword | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "playsbc.fullname" . }}-grafana-provisioning
  labels:
{{ include "playsbc.labels" . | indent 4 }}
data:
  datasource.yml: |-
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "playsbc.fullname" . }}-prometheus:{{ .Values.observability.prometheus.service.port }}
        isDefault: true
  dashboards.yml: |-
    apiVersion: 1
    providers:
      - name: PlaySBC
        orgId: 1
        folder: PlaySBC
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
{{- if .Values.observability.grafana.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "playsbc.fullname" . }}-grafana
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
{{- if .Values.observability.grafana.persistence.storageClassName }}
  storageClassName: {{ .Values.observability.grafana.persistence.storageClassName | quote }}
{{- end }}
  resources:
    requests:
      storage: {{ .Values.observability.grafana.persistence.size }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "playsbc.fullname" . }}-grafana
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "playsbc.name" . }}-grafana
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "playsbc.name" . }}-grafana
        app.kubernetes.io/instance: {{ .Release.Name }}
        playsbc.openai.com/realm-model: core-peer
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.observability.grafana.image.repository }}:{{ .Values.observability.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.observability.grafana.image.pullPolicy }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "playsbc.fullname" . }}-grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "playsbc.fullname" . }}-grafana-admin
                  key: admin-password
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
              readOnly: true
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
              readOnly: true
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
          resources:
{{ toYaml .Values.observability.grafana.resources | indent 12 }}
      volumes:
        - name: provisioning
          configMap:
            name: {{ include "playsbc.fullname" . }}-grafana-provisioning
        - name: dashboard
          configMap:
            name: {{ include "playsbc.fullname" . }}-grafana-dashboard
        - name: data
{{- if .Values.observability.grafana.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "playsbc.fullname" . }}-grafana
{{- else }}
          emptyDir: {}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "playsbc.fullname" . }}-grafana
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  type: {{ .Values.observability.grafana.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "playsbc.name" . }}-grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.observability.grafana.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
