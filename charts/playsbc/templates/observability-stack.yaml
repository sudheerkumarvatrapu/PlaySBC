{{- $observability := .Values.observability | default dict }}
{{- $obsEnabled := get $observability "enabled" | default false }}
{{- $prometheus := get $observability "prometheus" | default dict }}
{{- $grafana := get $observability "grafana" | default dict }}
{{- $promEnabled := get $prometheus "enabled" | default false }}
{{- $grafanaEnabled := get $grafana "enabled" | default false }}
{{- $promImage := get $prometheus "image" | default dict }}
{{- $promService := get $prometheus "service" | default dict }}
{{- $promPersistence := get $prometheus "persistence" | default dict }}
{{- $promResources := get $prometheus "resources" | default dict }}
{{- $grafanaImage := get $grafana "image" | default dict }}
{{- $grafanaService := get $grafana "service" | default dict }}
{{- $grafanaPersistence := get $grafana "persistence" | default dict }}
{{- $grafanaResources := get $grafana "resources" | default dict }}
{{- $promPersistenceEnabled := true }}
{{- if hasKey $promPersistence "enabled" }}
{{- $promPersistenceEnabled = get $promPersistence "enabled" }}
{{- end }}
{{- $grafanaPersistenceEnabled := true }}
{{- if hasKey $grafanaPersistence "enabled" }}
{{- $grafanaPersistenceEnabled = get $grafanaPersistence "enabled" }}
{{- end }}
{{- if or $obsEnabled $promEnabled $grafanaEnabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "playsbc.fullname" . }}-prometheus-config
  labels:
{{ include "playsbc.labels" . | indent 4 }}
data:
  prometheus.yml: |-
    global:
      scrape_interval: {{ get $prometheus "scrapeInterval" | default "15s" }}
      evaluation_interval: {{ get $prometheus "evaluationInterval" | default "15s" }}
    rule_files:
      - /etc/prometheus/rules.yml
    scrape_configs:
      - job_name: playsbc
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ include "playsbc.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.healthPort }}
            labels:
              app: playsbc
              namespace: {{ .Release.Namespace }}
              realm_model: core-peer
      - job_name: prometheus
        static_configs:
          - targets:
              - 127.0.0.1:9090
  rules.yml: |-
    groups:
      - name: playsbc.rules
        rules:
          - alert: PlaySBCAdmissionRejectionsHigh
            expr: sum(rate(playsbc_admission_rejections_total[5m])) > 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: PlaySBC is rejecting admitted calls.
          - alert: PlaySBCRtpengineControlFailures
            expr: sum(rate(playsbc_rtpengine_control_failures_total[5m])) > 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: RTPengine control path is failing.
          - alert: PlaySBCAiRasaFailures
            expr: sum(rate(playsbc_ai_rasa_failures_total[5m])) > 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: AI/Rasa voice turns are failing.
          - alert: PlaySBCTrunkDown
            expr: min(playsbc_trunk_healthy) == 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: One or more PlaySBC trunks are unhealthy.
          - alert: PlaySBCHaNodeDraining
            expr: max(playsbc_ha_node_draining) > 0
            for: 5m
            labels:
              severity: info
            annotations:
              summary: A PlaySBC HA node is draining.
---
{{- if $promPersistenceEnabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "playsbc.fullname" . }}-prometheus
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
{{- if get $promPersistence "storageClassName" }}
  storageClassName: {{ get $promPersistence "storageClassName" | quote }}
{{- end }}
  resources:
    requests:
      storage: {{ get $promPersistence "size" | default "5Gi" }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "playsbc.fullname" . }}-prometheus
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "playsbc.name" . }}-prometheus
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "playsbc.name" . }}-prometheus
        app.kubernetes.io/instance: {{ .Release.Name }}
        playsbc.openai.com/realm-model: core-peer
    spec:
      containers:
        - name: prometheus
          image: "{{ get $promImage "repository" | default "prom/prometheus" }}:{{ get $promImage "tag" | default "v2.55.1" }}"
          imagePullPolicy: {{ get $promImage "pullPolicy" | default "IfNotPresent" }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ get $prometheus "retention" | default "31d" }}
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
          resources:
{{ toYaml $promResources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "playsbc.fullname" . }}-prometheus-config
        - name: data
{{- if $promPersistenceEnabled }}
          persistentVolumeClaim:
            claimName: {{ include "playsbc.fullname" . }}-prometheus
{{- else }}
          emptyDir: {}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "playsbc.fullname" . }}-prometheus
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  type: {{ get $promService "type" | default "ClusterIP" }}
  selector:
    app.kubernetes.io/name: {{ include "playsbc.name" . }}-prometheus
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ get $promService "port" | default 9090 }}
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "playsbc.fullname" . }}-grafana-admin
  labels:
{{ include "playsbc.labels" . | indent 4 }}
type: Opaque
stringData:
  admin-user: {{ get $grafana "adminUser" | default "admin" | quote }}
  admin-password: {{ get $grafana "adminPassword" | default "playsbc-lab" | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "playsbc.fullname" . }}-grafana-provisioning
  labels:
{{ include "playsbc.labels" . | indent 4 }}
data:
  datasource.yml: |-
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "playsbc.fullname" . }}-prometheus:{{ get $promService "port" | default 9090 }}
        isDefault: true
  dashboards.yml: |-
    apiVersion: 1
    providers:
      - name: PlaySBC
        orgId: 1
        folder: PlaySBC
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
{{- if $grafanaPersistenceEnabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "playsbc.fullname" . }}-grafana
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
{{- if get $grafanaPersistence "storageClassName" }}
  storageClassName: {{ get $grafanaPersistence "storageClassName" | quote }}
{{- end }}
  resources:
    requests:
      storage: {{ get $grafanaPersistence "size" | default "2Gi" }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "playsbc.fullname" . }}-grafana
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "playsbc.name" . }}-grafana
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "playsbc.name" . }}-grafana
        app.kubernetes.io/instance: {{ .Release.Name }}
        playsbc.openai.com/realm-model: core-peer
    spec:
      containers:
        - name: grafana
          image: "{{ get $grafanaImage "repository" | default "grafana/grafana" }}:{{ get $grafanaImage "tag" | default "11.4.0" }}"
          imagePullPolicy: {{ get $grafanaImage "pullPolicy" | default "IfNotPresent" }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "playsbc.fullname" . }}-grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "playsbc.fullname" . }}-grafana-admin
                  key: admin-password
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
              readOnly: true
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
              readOnly: true
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
          resources:
{{ toYaml $grafanaResources | indent 12 }}
      volumes:
        - name: provisioning
          configMap:
            name: {{ include "playsbc.fullname" . }}-grafana-provisioning
        - name: dashboard
          configMap:
            name: {{ include "playsbc.fullname" . }}-grafana-dashboard
        - name: data
{{- if $grafanaPersistenceEnabled }}
          persistentVolumeClaim:
            claimName: {{ include "playsbc.fullname" . }}-grafana
{{- else }}
          emptyDir: {}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "playsbc.fullname" . }}-grafana
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  type: {{ get $grafanaService "type" | default "ClusterIP" }}
  selector:
    app.kubernetes.io/name: {{ include "playsbc.name" . }}-grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ get $grafanaService "port" | default 3000 }}
      targetPort: http
      protocol: TCP
{{- end }}
