{{- $topology := .Values.topology | default dict -}}
{{- $activeActiveCfg := get $topology "activeActive" | default dict -}}
{{- $activeActive := get $activeActiveCfg "enabled" | default false -}}
{{- $useStatefulSet := and $activeActive (get $activeActiveCfg "useStatefulSet" | default true) -}}
{{- $replicas := int .Values.replicaCount -}}
{{- if $activeActive -}}
{{- $replicas = int (get $activeActiveCfg "playsbcReplicas" | default 2) -}}
{{- end -}}
{{- $shared := get $activeActiveCfg "sharedState" | default dict -}}
{{- $sharedEnabled := and $activeActive (get $shared "enabled" | default true) -}}
{{- $sharedMountPath := get $shared "mountPath" | default "/var/lib/playsbc" -}}
{{- $multus := get $topology "multus" | default dict -}}
{{- $multusEnabled := get $multus "enabled" | default false -}}
{{- $coreNetwork := get $multus "coreNetwork" | default dict -}}
{{- $peerNetwork := get $multus "peerNetwork" | default dict -}}
{{- $multusNamespace := get $multus "namespace" | default .Release.Namespace -}}
{{- $coreNetworkName := get $coreNetwork "name" | default "playsbc-core-realm" -}}
{{- $peerNetworkName := get $peerNetwork "name" | default "playsbc-peer-realm" -}}
{{- $coreInterface := get $coreNetwork "interface" | default "net-core" -}}
{{- $peerInterface := get $peerNetwork "interface" | default "net-peer" -}}
apiVersion: apps/v1
kind: {{ if $useStatefulSet }}StatefulSet{{ else }}Deployment{{ end }}
metadata:
  name: {{ include "playsbc.fullname" . }}
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
{{- if $useStatefulSet }}
  serviceName: {{ include "playsbc.fullname" . }}
{{- end }}
  replicas: {{ $replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "playsbc.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "playsbc.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        playsbc.io/topology: {{ get $topology "model" | default "single-realm" | quote }}
{{- if or $multusEnabled $activeActive }}
      annotations:
{{- if $activeActive }}
        playsbc.io/active-active: "true"
{{- end }}
{{- if $multusEnabled }}
        k8s.v1.cni.cncf.io/networks: '[{"name":"{{ $coreNetworkName }}","namespace":"{{ $multusNamespace }}","interface":"{{ $coreInterface }}"},{"name":"{{ $peerNetworkName }}","namespace":"{{ $multusNamespace }}","interface":"{{ $peerInterface }}"}]'
{{- end }}
{{- end }}
    spec:
      hostNetwork: {{ .Values.hostNetwork }}
      containers:
        - name: playsbc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python3
            - /app/mini_call_server.py
            - --config
            - /etc/playsbc/server.yaml
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: sip-udp
              containerPort: {{ .Values.service.sipPort }}
              protocol: UDP
            - name: sip-tcp
              containerPort: {{ .Values.service.sipPort }}
              protocol: TCP
            - name: sip-tls
              containerPort: {{ .Values.service.tlsPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/playsbc
              readOnly: true
{{- if .Values.authSecret.enabled }}
            - name: auth-secret
              mountPath: /etc/playsbc-secret
              readOnly: true
{{- end }}
{{- if .Values.tls.enabled }}
            - name: tls-secret
              mountPath: /etc/playsbc-tls
              readOnly: true
{{- end }}
{{- if $sharedEnabled }}
            - name: ha-shared-state
              mountPath: {{ $sharedMountPath }}
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "playsbc.fullname" . }}-config
{{- if .Values.authSecret.enabled }}
        - name: auth-secret
          secret:
            secretName: {{ default (printf "%s-auth" (include "playsbc.fullname" .)) .Values.authSecret.existingSecret }}
{{- end }}
{{- if .Values.tls.enabled }}
        - name: tls-secret
          secret:
            secretName: {{ required "tls.existingSecret is required when TLS is enabled" .Values.tls.existingSecret }}
{{- end }}
{{- if $sharedEnabled }}
        - name: ha-shared-state
          persistentVolumeClaim:
            claimName: {{ include "playsbc.fullname" . }}-ha-state
{{- end }}
