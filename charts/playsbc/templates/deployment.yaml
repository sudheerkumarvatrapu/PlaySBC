apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "playsbc.fullname" . }}
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "playsbc.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "playsbc.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      hostNetwork: {{ .Values.hostNetwork }}
      containers:
        - name: playsbc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python3
            - /app/mini_call_server.py
            - --config
            - /etc/playsbc/server.yaml
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: sip-udp
              containerPort: {{ .Values.service.sipPort }}
              protocol: UDP
            - name: sip-tcp
              containerPort: {{ .Values.service.sipPort }}
              protocol: TCP
            - name: sip-tls
              containerPort: {{ .Values.service.tlsPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/playsbc
              readOnly: true
{{- if .Values.authSecret.enabled }}
            - name: auth-secret
              mountPath: /etc/playsbc-secret
              readOnly: true
{{- end }}
{{- if .Values.tls.enabled }}
            - name: tls-secret
              mountPath: /etc/playsbc-tls
              readOnly: true
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "playsbc.fullname" . }}-config
{{- if .Values.authSecret.enabled }}
        - name: auth-secret
          secret:
            secretName: {{ default (printf "%s-auth" (include "playsbc.fullname" .)) .Values.authSecret.existingSecret }}
{{- end }}
{{- if .Values.tls.enabled }}
        - name: tls-secret
          secret:
            secretName: {{ required "tls.existingSecret is required when TLS is enabled" .Values.tls.existingSecret }}
{{- end }}
