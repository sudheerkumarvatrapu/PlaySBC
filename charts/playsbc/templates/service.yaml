{{- $topology := .Values.topology | default dict -}}
{{- $activeActiveCfg := get $topology "activeActive" | default dict -}}
{{- $activeActive := get $activeActiveCfg "enabled" | default false -}}
{{- $useStatefulSet := and $activeActive (get $activeActiveCfg "useStatefulSet" | default true) -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "playsbc.fullname" . }}
  labels:
{{ include "playsbc.labels" . | indent 4 }}
{{- $observability := .Values.observability | default dict }}
{{- $prometheus := get $observability "prometheus" | default dict }}
{{- $scrapeAnnotations := get $prometheus "scrapeAnnotations" | default false }}
{{- $serviceAnnotations := .Values.service.annotations | default dict }}
{{- if or $scrapeAnnotations $serviceAnnotations }}
  annotations:
{{- if $scrapeAnnotations }}
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "{{ .Values.service.healthPort }}"
{{- end }}
{{- with $serviceAnnotations }}
{{ toYaml . | indent 4 }}
{{- end }}
{{- end }}
spec:
  type: {{ .Values.service.type }}
  sessionAffinity: {{ .Values.service.sessionAffinity }}
  selector:
    app.kubernetes.io/name: {{ include "playsbc.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: sip-udp
      port: {{ .Values.service.sipPort }}
      targetPort: sip-udp
      protocol: UDP
    - name: sip-tcp
      port: {{ .Values.service.sipPort }}
      targetPort: sip-tcp
      protocol: TCP
    - name: sip-tls
      port: {{ .Values.service.tlsPort }}
      targetPort: sip-tls
      protocol: TCP
    - name: health
      port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
{{- if $useStatefulSet }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "playsbc.fullname" . }}-headless
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: {{ include "playsbc.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: sip-udp
      port: {{ .Values.service.sipPort }}
      targetPort: sip-udp
      protocol: UDP
    - name: sip-tcp
      port: {{ .Values.service.sipPort }}
      targetPort: sip-tcp
      protocol: TCP
    - name: sip-tls
      port: {{ .Values.service.tlsPort }}
      targetPort: sip-tls
      protocol: TCP
    - name: health
      port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
{{- end }}
