{{- if .Values.rtpengine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "playsbc.fullname" . }}-rtpengine
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "playsbc.name" . }}-rtpengine
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "playsbc.name" . }}-rtpengine
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      hostNetwork: {{ .Values.rtpengine.hostNetwork }}
      containers:
        - name: rtpengine
          image: "{{ .Values.rtpengine.image.repository }}:{{ .Values.rtpengine.image.tag }}"
          imagePullPolicy: {{ .Values.rtpengine.image.pullPolicy }}
          command: ["/bin/sh", "-ec"]
          args:
            - >-
              exec rtpengine --foreground --log-stderr
              --interface=default/${NODE_IP}
              --listen-ng=0.0.0.0:{{ .Values.rtpengine.controlPort }}
              --port-min={{ .Values.rtpengine.rtpMin }}
              --port-max={{ .Values.rtpengine.rtpMax }}
              --table=-1
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - name: ng-control
              containerPort: {{ .Values.rtpengine.controlPort }}
              protocol: UDP
          resources:
{{ toYaml .Values.rtpengine.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "playsbc.fullname" . }}-rtpengine
  labels:
{{ include "playsbc.labels" . | indent 4 }}
spec:
  sessionAffinity: {{ .Values.rtpengine.sessionAffinity }}
  selector:
    app.kubernetes.io/name: {{ include "playsbc.name" . }}-rtpengine
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: ng-control
      port: {{ .Values.rtpengine.controlPort }}
      targetPort: ng-control
      protocol: UDP
{{- end }}
