name: Security scans

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  codeql-python:
    name: CodeQL Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: +security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:python

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  trivy-repository:
    name: Trivy repository scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan repository files
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-repository.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-repository.sarif

  checkov-config:
    name: Checkov config scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Checkov
        run: python -m pip install --upgrade checkov

      - name: Scan Docker, Helm, Kubernetes, Actions, and secrets
        run: |
          checkov \
            --directory . \
            --framework dockerfile,helm,kubernetes,github_actions,secrets \
            --skip-path logs \
            --skip-path release \
            --quiet \
            --compact \
            --soft-fail \
            --output cli \
            --output sarif \
            --output-file-path console,checkov.sarif

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
